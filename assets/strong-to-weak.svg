<svg xmlns="http://www.w3.org/2000/svg" width="920" height="340" viewBox="0 0 920 340" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
	<!-- Hand-authored, reproducible/diffable hero: strong reference -> weak reference rewrite -->
	<rect x="0" y="0" width="920" height="340" rx="14" fill="#101317"/>

	<!-- Title: before -->
	<text x="40" y="48" fill="#f4f6f8" font-size="22" font-weight="700">Strong reference</text>
	<text x="40" y="72" fill="#8b95a1" font-size="13">deleting the target is blocked</text>

	<!-- Title: after -->
	<text x="540" y="48" fill="#f4f6f8" font-size="22" font-weight="700">Weak reference</text>
	<text x="540" y="72" fill="#8b95a1" font-size="13">target can be deleted freely</text>

	<!-- BEFORE card -->
	<rect x="40" y="96" width="360" height="208" rx="10" fill="#181c22" stroke="#2a313a" stroke-width="1"/>
	<rect x="40" y="96" width="6" height="208" rx="3" fill="#e0564a"/>
	<text x="68" y="132" fill="#9fb0c0" font-size="14" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">{</text>
	<text x="86" y="158" fill="#c8d2dc" font-size="14" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">"_type": <tspan fill="#7fd1b9">"reference"</tspan>,</text>
	<text x="86" y="184" fill="#c8d2dc" font-size="14" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">"_ref": <tspan fill="#7fd1b9">"font-abc123"</tspan></text>
	<text x="68" y="210" fill="#9fb0c0" font-size="14" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">}</text>
	<rect x="68" y="236" width="116" height="30" rx="15" fill="#3a201e"/>
	<text x="84" y="256" fill="#e0564a" font-size="13" font-weight="600">STRONG</text>

	<!-- arrow -->
	<line x1="424" y1="200" x2="516" y2="200" stroke="#5a6573" stroke-width="2"/>
	<polygon points="516,200 504,194 504,206" fill="#5a6573"/>
	<text x="438" y="188" fill="#8b95a1" font-size="12">convert</text>

	<!-- AFTER card -->
	<rect x="540" y="96" width="340" height="208" rx="10" fill="#181c22" stroke="#2a313a" stroke-width="1"/>
	<rect x="540" y="96" width="6" height="208" rx="3" fill="#e0a33a"/>
	<text x="568" y="132" fill="#9fb0c0" font-size="14" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">{</text>
	<text x="586" y="158" fill="#c8d2dc" font-size="14" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">"_type": <tspan fill="#7fd1b9">"reference"</tspan>,</text>
	<text x="586" y="184" fill="#f4d06a" font-size="14" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">"_weak": true,</text>
	<text x="586" y="210" fill="#c8d2dc" font-size="14" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">"_ref": <tspan fill="#7fd1b9">"font-abc123"</tspan></text>
	<text x="568" y="236" fill="#9fb0c0" font-size="14" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">}</text>
	<rect x="586" y="252" width="96" height="30" rx="15" fill="#3a2f1a"/>
	<text x="602" y="272" fill="#e0a33a" font-size="13" font-weight="600">WEAK</text>
</svg>
